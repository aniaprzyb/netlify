<!-- -----------------SEPARATOR WARSZTATÓW ----------------- -->
<p style="border-bottom:1px solid #000;border-top-width: 0px;border-top-style: solid;margin-top: 1em;margin-bottom: 1em;"></p>

<strong>Prof. Andrzej Blikle
<br> 
Warsztat komunikacyjny. Gdy słuchasz i mówisz.
<br>
</strong>
<br>
Skuteczność naszego działania, czy to zawodowego, społecznego, czy rodzinnego, zależy w ogromnej
mierze od relacji jakie potrafimy zbudować z otaczającymi nas ludźmi. Potwierdziły to m.in. badania
Instytutu Gallupa pokazujące, że tzw. inteligencja emocjonalna bardzo silnie koreluje z osiąganym przez
człowieka sukcesem życiowym. I dzieje się tak niezależnie od zawodu, wykształcenia czy też kręgu
kulturowego.
Budowanie pozytywnych relacji jest więc nieocenioną sztuką, niestety często bywa też niedocenianą.
Niedocenianą zarówno przez brak świadomości, że jest ona tak ważna, jak i przez brak podstawowych
umiejętności takich jak asertywna komunikacja, rozwiązywanie sporów metodą wygrał-wygrał, eliminacja
zachowań wywołujących strach, rozmowy konfrontacyjne i rozmowy prowadzone w sytuacjach
konfliktowych. To bardzo obszerna wiedza, dziś nie każdemu znana, ale dla każdego dostępna. To wiedza,
która czyni nas skuteczniejszymi i szczęśliwszymi zarazem. Bo lepiej żyje się wśród przyjaciół i ludzi
życzliwych niż wśród zawistnych konkurentów czekających na chwilę naszej słabości.
Umiejętność budowania dobrych relacji z ludźmi zaczyna się od sztuki uważności, a więc umiejętności
skupienia się na drugim człowieku, wsłuchania się w to, co do nas mówi, zrozumienia jego emocji. Wbrew
pozorom, największą szansę na zbudowanie dobrej relacji z drugim człowiekiem mamy nie wtedy, gdy do
niego mówimy, ale gdy go słuchamy. Jednakże słuchać też trzeba umieć. Sztuka uważności zaczyna się
więc od tzw. aktywnego słuchania, tj. takiego słuchania, które wyraża szacunek do mówiącego i
zainteresowanie tym, co do nas mówi. I tej właśnie umiejętności poświęcimy nasz warsztat




