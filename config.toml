<strong> Marcin Kępka <br> 
O rycerzu, który wiedział co robić.  
<br><br>
</strong>
<br>
Setki szkoleń i certyfikatów ze wszystkich frameworków, jakie kiedykolwiek ktoś wymyślił. Tajemnicze ceremonie, tablice ociekające taskami, a backlog wyrośnięty jak dobre ciasto. A jednak cały czas stoimy w miejscu, a nieliczni mówią już głośno: „Agile is dead."
Zapraszam Cię na warsztat, na którym nie będziemy naprawiać backlogów ani uczyć się 1456 sposobów estymowania w Gumisiach. Przyjrzymy się za to mechanizmom, które naprawdę sterują zmianą… lub jej brakiem.
Co wydarzy się na warsztacie? 
Przywdziejesz zbroję i w unikalnej symulacji sprawdzisz swoją odwagę w starciu z prawdziwymi potworami transformacji 
Odkryjesz mechanizmy, które kierują Tobą, szlachtą i Królem - szczególnie gdy w okolicy pojawia się Agile
Poznasz narzędzie, które możesz przyłożyć do miejsca, gdzie naprawdę boli 
Na jakie łupy możesz liczyć? 
Osobista mapa, która pokaże Ci, dlaczego sam robisz inaczej niż byś chciał 
Mapa blokad całego królestwa, abyś wiedział, gdzie zmiana utknęła i dlaczego 
Konkretny eksperyment do wdrożenia w ciągu dwóch tygodni (zamiast kolejnego planu transformacji)
Dla kogo? 
Dla Scrum Masterów, Agile Coachów i Product Ownerów, którzy mają odwagę zdjąć przyłbicę i sprawdzić, co naprawdę dzieje się w głowach szlachty i Króla gdy faktycznie wjeżdża zmiana. Udział we wcześniejszych krucjatach szerzących zwinność i liczne blizny mile widziane. 

