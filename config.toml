[[params.Schedule]]
    [[params.Schedule.authors]]
    name = "Prof. Andrzej Blikle"
    photo = "img/ABlikle.jpeg"
    bio = """
    Prof. Andrzej Blikle jest matematykiem i informatykiem specjalizującym się w
matematycznych podstawach inżynierii oprogramowania, a także trenerem biznesu.
W latach 1990 – 2010 rozwinął swoją cukierniczą firmę rodzinną założoną w roku
1869 z jednej cukierni w Warszawie do piętnastu placówek (cukiernie, kawiarni,
restauracje i sklepy delikatesowe) w Warszawie i ośmiu w ogólnopolskiej sieci
franczyzowej.
Od roku 2018 prowadzi firmę szkoleniowo-doradcą Andrzej Blikle Doradca oferując
szkolenia zarówno dla indywidualnych firm i organizacji, jak i w ramach studiów MBA,
mi.in. w Instytucie Nauk Ekonomicznych PAN.
Jego książka „Doktryna jakości – rzecz o skutecznym zarządzaniu” zajęła w 2015 r.
pierwsze miejsce w kategorii „Najlepszy poradnik ekonomiczny” w konkursie
Economicus 2015 organizowanym przez „Dziennik Gazeta Prawna”, a w 2016 r.
otrzymała nagrodę Kolegium Nauk o Przedsiębiorstwie Szkoły Głównej Handlowej w
Warszawie „za najlepszą pracę z zakresu nauk o przedsiębiorstwie w latach 2014 –
2015”.
Jest członkiem Europejskiej Akademii Nauk, Rady Języka Polskiego i ponad 20
innych organizacji.
    """

      [params.Schedule.authors.link]
        href = 'https://moznainaczej.com.pl/ksiazka-i-artykuly/turkus-i-bcorpy'
        text = 'www'

    [params.Schedule.presentation]
      title = 'Turkusowa organizacja XXI wieku. Nowy paradygmat organizowania pracy zespołowej'
      description = """ Przedmiotem wykładu będzie przedstawienie słuchaczom nowych idei związanych z
organizowaniem pracy zespołowej. Na gruncie filozoficznym są one znane od
czterech tysięcy lat i można je streścić słowami: “ludzie wolni i szczęśliwi pracują
lepiej”. Jednak stosunkowo od niedawna (kilkadziesiąt lat) nabierają praktycznego
wymiaru w tym sensie, że pojawia się coraz więcej organizacji, a w tym i firm, które
potrafią je wdrożyć i dzięki temu osiągnąć spektakularne sukcesy. Niedawno opisał je
w bardzo przekonywujący sposób Frederic Laloux i nazwał organizacjami
turkusowymi, a ja w ciągu ostatnich 15 lat spotykam bardzo wiele takich firm wśród
moich słuchaczy. Na podstawie ich wypowiedzi szacuję, że jest ich w Polsce pewnie
dobrze ponad tysiąc, choć – być może – wiele z nich jeszcze nie wie, że mówią
„turkusową prozą”. Dość pokaźną grupę turkusowych organizacji stanowią też szkoły.
Również w Polsce.. 
      """
#------------------------

[[params.Schedule]]
    [[params.Schedule.authors]]
    name = "Bartosz Juszczak"
    photo = "img/juszczak.jpg"
    bio = """
    Wspieram organizacje i ich zespoły w osiąganiu trwałych zmian, łącząc praktyczne zarządzanie zmianą z profesjonalnym coachingiem. Moja specjalność to budowanie zwinności jako strategicznej kompetencji by umożliwiać osiąganie lepszych rezultatów biznesowych. Moje doświadczenie obejmuje liderskie role w trzech transformacjach zwinnych (mających wpływ na pracę kilkuset do 1500+ osób).
    <br>Jako ekspert patrzę na firmy systemowo, wspierając innowacyjność poprzez dobre przywództwo, skuteczne uczenie się organizacji oraz jej zdolność do adaptacji. Jako akredytowany coach ICF (zespołów i indywidualny) pomagam zespołom przezwyciężać trudności i wchodzić na wyższy poziom synergii oraz współodpowiedzialności. Swoje wieloletnie doświadczenie jako lider, menedżer i konsultant zdobywałem w organizacjach o różnej skali – od start-upów po międzynarodowe korporacje.
    <br> Więcej o mnie: https://www.linkedin.com/in/bartoszjuszczak/ oraz https://bartekjuszczak.pl/
    """
    
      [params.Schedule.authors.link]
        href = 'https://bartekjuszczak.pl/'
        text = 'www'

    [params.Schedule.presentation]
      title = 'Ludzka twarz zmiany. 7 grzechów głównych, które sabotują trwałość transformacji.'
      description = """Większość transformacji kończy się fiaskiem nie dlatego, że zawiodły procesy czy technologie. Nie osiągają zakładanego sukcesu, bo zostały zaprojektowane jako modele operacyjne w arkuszu kalkulacyjnym, z pominięciem najważniejszego ogniwa: ludzkiej gotowości na zmianę status quo.
      <br>
      Zmiana na poziomie organizacji niemal zawsze wywołuje opór, frustrację i napięcie. Liderzy naturalnie skupiają się na procedurach i dowiezieniu artefaktów. Jednak kluczem do mierzalnych rezultatów biznesowych jest aspekt ludzki – to on decyduje, czy inwestycja w transformację ostatecznie się zwróci.
      <br> 
      Opierając się na własnych doświadczeniach z wiodących ról w trzech dużych transformacjach (każda obejmująca od kilkuset do ponad 1500 osób), zapraszam Cię do spojrzenia prawdzie w oczy. Przyjrzymy się 7 grzechom głównym, które sprawiają, że mimo ogromnych nakładów, organizacje nigdy nie wychodzą ze starego porządku lub po cichu do niego wracają. Tych lekcji nie znajdziesz w podręcznikach.
      <br> To wystąpienie jest dla każdego, kto chce wyjść poza iluzję transformacji i budować zmianę, która przetrwa próbę czasu - bo została przez ludzi zaakceptowana, a nie jedynie narzucona przez zarząd.

"""

#------------------------

