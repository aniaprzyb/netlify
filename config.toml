<!-- -----------------SEPARATOR WARSZTATÓW ----------------- -->
<p style="border-bottom:1px solid #000;border-top-width: 0px;border-top-style: solid;margin-top: 1em;margin-bottom: 1em;"></p>

<strong>Prof. Andrzej Blikle
<br> 
Warsztat komunikacyjny. Gdy słuchasz i mówisz.
<br>
</strong>
<br>
Skuteczność naszego działania, czy to zawodowego, społecznego, czy rodzinnego, zależy w ogromnej
mierze od relacji jakie potrafimy zbudować z otaczającymi nas ludźmi. Potwierdziły to m.in. badania
Instytutu Gallupa pokazujące, że tzw. inteligencja emocjonalna bardzo silnie koreluje z osiąganym przez
człowieka sukcesem życiowym. I dzieje się tak niezależnie od zawodu, wykształcenia czy też kręgu
kulturowego.
Budowanie pozytywnych relacji jest więc nieocenioną sztuką, niestety często bywa też niedocenianą.
Niedocenianą zarówno przez brak świadomości, że jest ona tak ważna, jak i przez brak podstawowych
umiejętności takich jak asertywna komunikacja, rozwiązywanie sporów metodą wygrał-wygrał, eliminacja
zachowań wywołujących strach, rozmowy konfrontacyjne i rozmowy prowadzone w sytuacjach
konfliktowych. To bardzo obszerna wiedza, dziś nie każdemu znana, ale dla każdego dostępna. To wiedza,
która czyni nas skuteczniejszymi i szczęśliwszymi zarazem. Bo lepiej żyje się wśród przyjaciół i ludzi
życzliwych niż wśród zawistnych konkurentów czekających na chwilę naszej słabości.
Umiejętność budowania dobrych relacji z ludźmi zaczyna się od sztuki uważności, a więc umiejętności
skupienia się na drugim człowieku, wsłuchania się w to, co do nas mówi, zrozumienia jego emocji. Wbrew
pozorom, największą szansę na zbudowanie dobrej relacji z drugim człowiekiem mamy nie wtedy, gdy do
niego mówimy, ale gdy go słuchamy. Jednakże słuchać też trzeba umieć. Sztuka uważności zaczyna się
więc od tzw. aktywnego słuchania, tj. takiego słuchania, które wyraża szacunek do mówiącego i
zainteresowanie tym, co do nas mówi. I tej właśnie umiejętności poświęcimy nasz warsztat




<!-- -----------------SEPARATOR WARSZTATÓW ----------------- -->
<p style="border-bottom:1px solid #000;border-top-width: 0px;border-top-style: solid;margin-top: 1em;margin-bottom: 1em;"></p>

<strong> Bartosz Juszczak<br> 
Ludzka twarz zmiany. Liderskie cnoty w procesie transformacji.
 <br>
</strong>
<br>
Uświadomienie sobie 7 grzechów głównych to dopiero początek drogi do rzeczywistej transformacji. Warsztaty będą pogłębieniem wcześniejszego wystąpienia i zaproszeniem do wspólnego wypracowania metod, które minimalizują ryzyko braku zmiany lub powrotu organizacji do starego status quo. To przestrzeń, by zadać trudne pytania i znaleźć odpowiedzi na to, jak sprawić, by ogromna inwestycja w zmianę – mierzona czasem, energią czy budżetem – ostatecznie się zwróciła.
<br>
Podczas warsztatów skupimy się przede wszystkim na aspektach przywództwa i postawach liderskich. To one stanowią kluczowy fundament, by skutecznie zaadresować ludzkie aspekty zmiany i zagwarantować jej realną trwałość. Wyjdziesz z warsztatów z konkretną perspektywą na to, jak poprzez własną postawę wspierać transformację w sposób skuteczny, trwały i – przede wszystkim – po ludzku udany.


<!-- -----------------SEPARATOR WARSZTATÓW ----------------- -->
<p style="border-bottom:1px solid #000;border-top-width: 0px;border-top-style: solid;margin-top: 1em;margin-bottom: 1em;"></p>

<strong> dr Jakub Perlak <br> 
Zrozum System. Zaprojektuj Zmianę. 
<br><br>
</strong>
<br>
Masz dość gaszenia pożarów i doraźnych interwencji? Chcesz lepiej zrozumieć opór w organizacji i zacząć go wykorzystywać jako energię do transformacji?

Dołącz do intensywnego warsztatu, gdzie połączymy dyscyplinę myślenia systemowego z głębokim relacyjnym podejściem do zmiany. Pracując wspólnie, będziemy się uczyć, jak diagnozować blokady w zmianie i projektować interwencje, które prowadzą do trwałej, systemowej zmiany.

<!-- -----------------SEPARATOR WARSZTATÓW ----------------- -->
<p style="border-bottom:1px solid #000;border-top-width: 0px;border-top-style: solid;margin-top: 1em;margin-bottom: 1em;"></p>

<strong> Dariusz Góras <br> 
Zobaczyć niewidzialne: Jak Notestorming „rozbraja” opór przed zmianą?
<br><br>
</strong>
<br>
Zapraszam Cię na warsztat, na którym przestaniemy o problemach rozmawiać, a zaczniemy im się... przyglądać. Dosłownie.
Podczas tych dwóch godzin doświadczysz Notestormingu – metody, która pozwala „wyjąć” myśli z głowy i zmaterializować je na kolorowych karteczkach. Zamiast tracić energię na przekonywanie nieprzekonanych, nauczymy się strukturyzować chaos opinii, faktów i obaw w rygorystyczny, wizualny układ. 
Na przykładzie starcia „Strażników tradycji" z „Pionierami innowacji”  sprawdzimy w praktyce:
        - Jak obiektywizować lęki, by przestały blokować działanie?  
        - Jak przejść od emocjonalnego impasu do generowania rozwiązań, których nie było widać w gęstym dymie dyskusji?  
        - Jak sprawić, by każdy uczestnik procesu poczuł się autorem rozwiązania, a nie ofiarą zmiany?  
To nie będzie kolejny wykład. To sesja „brudzenia rąk” markerami, gdzie poczujesz, jak zmiana perspektywy z „słyszę, co mówisz” na „widzę, co myślimy” zmienia wszystko. Wyjdziesz z konkretnym doświadczeniem. 

To praktyczna sesja pełna przykładów, dyskusji i konkretnych narzędzi, które możesz wykorzystać w swojej organizacji od razu po warsztacie.

<!-- -----------------SEPARATOR WARSZTATÓW ----------------- -->
<p style="border-bottom:1px solid #000;border-top-width: 0px;border-top-style: solid;margin-top: 1em;margin-bottom: 1em;"></p>

<strong> Wiktor Żołnowski <br> 
Jak skutecznie współpracować z Zarządem przy zmianie organizacyjnej 
<br><br>
</strong>
<br>
Zmiana organizacyjna rzadko zatrzymuje się na poziomie zespołów. Prawdziwy wpływ zaczyna się tam, gdzie spotykają się strategia, decyzje biznesowe i codzienna praktyka działania organizacji.

Ten warsztat jest dla Agile Coachów, Scrum Masterów i Managerów, którzy chcą skuteczniej współpracować z Zarządem, CEO oraz Top-Level Managementem przy prowadzeniu zmian w firmie. Porozmawiamy o tym, jak systemowo, w uporządkowany sposób planować i przeprowadzać zmianę, jak przekładać inicjatywy transformacyjne na język biznesu oraz jak zwiększać widoczność i realny wpływ działań zmianowych.

Podczas warsztatu skupimy się m.in. na:
- pracy ze strategią i priorytetami organizacji,
- budowaniu transparentności zmian i ich efektów,
- monitorowaniu procesów oraz mierników wspierających decyzje,
- komunikacji z managementem wysokiego szczebla,
- tworzeniu warunków do trwałej zmiany organizacyjnej.

To praktyczna sesja pełna przykładów, dyskusji i konkretnych narzędzi, które możesz wykorzystać w swojej organizacji od razu po warsztacie.

