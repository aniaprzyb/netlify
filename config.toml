  name = "Justyna (Kęsik) Rędzikowska"
  photo = "img/redzikowska.png"
  bio = """
  Specjalizuję się w Ways of Working. Buduję efektywne zespoły, wspierające społeczności, wbijam level up organizacjom. Pracuję z wartościami, ludźmi, danymi i procesami. Uwielbiam się uczyć oraz dzielić wiedzą. 
  <br>
  Od 2003 rozwijam się jako liderka, a od 2006 jako trenerka, facylitatorka i mentorka.
  <br>
  Lubię zadawać pytania, ogromnie ciekawi mnie świat, człowiek i procesy jakie zachodzą pomiędzy.
  <br>
  Aktualnie działam jako Scrum/Kanban Masterka oraz Agile Coachka w Danonie, choć na umowie mi napisano, że jestem Starszym Kierownikiem, a ja ani stara ani panowie pod Żabką nie mówią mi "Kierowniczko" ;)
  """
